services:
  postgres:
    image: postgres:16-alpine
    container_name: yulik3d-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - yulik3d-net

  redis:
    image: redis:7-alpine
    container_name: yulik3d-redis
    restart: unless-stopped
    command:
      - "redis-server"
      - "--requirepass"
      - "${REDIS_PASSWORD}"
      - "--appendonly"
      - "yes"
      - "--appendfsync"
      - "everysec"
      - "--maxmemory-policy"
      - "volatile-lru"
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - yulik3d-net

  minio:
    image: minio/minio:latest
    container_name: yulik3d-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    ports:
      - "${MINIO_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - yulik3d-net

  minio-init:
    image: minio/mc:latest
    container_name: yulik3d-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
        mc mb --ignore-existing local/$$MINIO_BUCKET;
        mc anonymous set download local/$$MINIO_BUCKET;
        exit 0;
      "
    networks:
      - yulik3d-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yulik3d-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      # Внутри контейнера бэк всегда слушает 8080 — это нужно nginx-у фронта
      # для проксирования. Внешний порт (наружу) задаётся через BACKEND_EXTERNAL_PORT.
      BACKEND_PORT: 8080
      BACKEND_HOST: 0.0.0.0
      APP_ENV: ${APP_ENV}
      LOG_LEVEL: ${LOG_LEVEL}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      PUBLIC_BACKEND_URL: ${PUBLIC_BACKEND_URL}
      PUBLIC_FRONTEND_URL: ${PUBLIC_FRONTEND_URL}

      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE}

      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: ${REDIS_DB}
      REDIS_ASYNQ_DB: ${REDIS_ASYNQ_DB}

      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS}
      COOKIE_SECURE: ${COOKIE_SECURE}
      COOKIE_NAME: ${COOKIE_NAME}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}

      RATE_LIMIT_AUTH_ATTEMPTS: ${RATE_LIMIT_AUTH_ATTEMPTS}
      RATE_LIMIT_AUTH_WINDOW_SECONDS: ${RATE_LIMIT_AUTH_WINDOW_SECONDS}

      ARGON2_MEMORY_KIB: ${ARGON2_MEMORY_KIB}
      ARGON2_ITERATIONS: ${ARGON2_ITERATIONS}
      ARGON2_PARALLELISM: ${ARGON2_PARALLELISM}

      MINIO_HOST: ${MINIO_HOST}
      MINIO_PORT: ${MINIO_PORT}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL}
      MINIO_USE_SSL: ${MINIO_USE_SSL}

      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES}

      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      SMTP_USE_SSL: ${SMTP_USE_SSL}
      ADMIN_NOTIFY_EMAIL: ${ADMIN_NOTIFY_EMAIL}
      MAIL_SUPPORT_CONTACT: ${MAIL_SUPPORT_CONTACT}

      PWRESET_TOKEN_TTL_SECONDS: ${PWRESET_TOKEN_TTL_SECONDS}
      PWRESET_THROTTLE_SECONDS: ${PWRESET_THROTTLE_SECONDS}

      EMAIL_VERIFY_TOKEN_TTL_SECONDS: ${EMAIL_VERIFY_TOKEN_TTL_SECONDS}
      EMAIL_VERIFY_THROTTLE_SECONDS: ${EMAIL_VERIFY_THROTTLE_SECONDS}
    ports:
      # Снаружи можно открыть на любом порту (если 8080 занят — поменять в .env)
      - "${BACKEND_EXTERNAL_PORT:-8080}:8080"
    networks:
      - yulik3d-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: yulik3d-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"
    networks:
      - yulik3d-net

volumes:
  postgres-data:
  redis-data:
  minio-data:

networks:
  yulik3d-net:
    driver: bridge
