server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 12m;

    # SPA: любой неизвестный путь возвращает index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html — НЕ кэшировать (иначе браузер берёт старую версию со старыми ссылками на JS/CSS)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # JS/CSS бандлы Vite — с хэшем в имени, можно кэшировать долго
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # API проксируется на бэкенд по docker-сети
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_request_headers on;
        # Cookies проходят как есть
    }

    # SEO: sitemap.xml генерится бэком на корневом пути
    location = /sitemap.xml {
        proxy_pass http://backend:8080/sitemap.xml;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Картинки из MinIO — проксируем тоже, чтобы было одно origin
    location /minio/ {
        rewrite ^/minio/(.*)$ /$1 break;
        proxy_pass http://minio:9000;
        proxy_set_header Host $host;
    }
}
